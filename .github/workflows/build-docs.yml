name: Build Documentation

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "main.py"
      - "requirements.txt"
      - "scripts/**"
      - "docker/**"
      - ".github/workflows/build-docs.yml"
  workflow_dispatch:
    inputs:
      erm_production_url:
        description: "ERM Production URL"
        required: false
        default: "https://elked.getmap.gr"
        type: string
      keycloak_url:
        description: "Keycloak URL"
        required: false
        default: "https://accounts.dev-1.hsc.eofarm.com"
        type: string

jobs:
    build-docs:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # Full history for git-based mkdocs plugins

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.11"
                  cache: "pip"

            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -r requirements.txt

            - name: Build documentation with mkdocs
              run: mkdocs build -d dist
              env:
                  ERM_PRODUCTION_URL: ${{ inputs.erm_production_url || 'https://elked.getmap.gr' }}
                  KEYCLOAK_URL: ${{ inputs.keycloak_url || 'https://accounts.dev-1.hsc.eofarm.com' }}

            - name: Upload docs artifact
              uses: actions/upload-artifact@v4
              with:
                  name: docs-site
                  path: dist
                  retention-days: 5

    build-docker-image:
        needs: build-docs
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Download docs artifact
              uses: actions/download-artifact@v4
              with:
                  name: docs-site
                  path: dist

            - name: Set lowercase repository owner
              id: lowercase
              run: echo "repo_owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Build and push Docker image
              uses: docker/build-push-action@v5
              with:
                  context: .
                  file: docker/dockerfile
                  push: true
                  tags: |
                      ghcr.io/${{ steps.lowercase.outputs.repo_owner }}/geodatahub-doc:latest
                      ghcr.io/${{ steps.lowercase.outputs.repo_owner }}/geodatahub-doc:${{ github.sha }}
                  labels: |
                      org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
                      org.opencontainers.image.revision=${{ github.sha }}
                      org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

    publish-to-gh-pages:
        needs: build-docs
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Download docs artifact
              uses: actions/download-artifact@v4
              with:
                  name: docs-site